MSG_DOCTOR_TITLE="Доктор KnightOS"
MSG_HELP_TITLE="Справка KnightOS"
MSG_HELP_TEXT="Добро пожаловать в KnightOS!\n\n=== НАЧАЛО РАБОТЫ ===\n- Используйте кнопки слева для запуска диагностики, управления пакетами или бенчмарков.\n- Доктор проверяет систему и предлагает исправления. Нажмите 'Fix All', чтобы применить их автоматически.\n- Пакеты — это как приложения, которые устанавливают оптимизации. Их можно устанавливать, удалять или запускать.\n- Удалённые репозитории позволяют делиться пакетами с сообществом и использовать чужие.\n\n=== КОМАНДНАЯ СТРОКА ===\nВсе функции также доступны через терминал:\n  ./knight doctor\n  ./knight install <пакет>\n  ./knight remove <пакет>\n  ./knight update\n  ./knight list\n  ./knight info <пакет>\n  ./knight monitor baseline|compare|history|show\n  ./knight parse <git-url>\n  ./knight remote add|list|remove|update\n\n=== ФИЛОСОФИЯ ===\nKnightOS разработан безопасным: он никогда не изменяет систему без вашего согласия. Все настройки обратимы, и всегда можно вернуться к исходным параметрам.\n\n=== НУЖНА ПОМОЩЬ? ===\nПосетите репозиторий: https://github.com/LittleDxrky/KnightOS\n\nНаслаждайтесь более быстрой и стабильной системой!"
