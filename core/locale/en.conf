MSG_DOCTOR_TITLE="KnightOS Doctor"
MSG_HELP_TITLE="KnightOS Help"
MSG_HELP_TEXT="Welcome to KnightOS!\n\n=== GETTING STARTED ===\n- Use the buttons on the left to run diagnostics, manage packages, or benchmark your system.\n- Doctor checks your system and suggests fixes. Click 'Fix All' to apply them automatically.\n- Packages are like apps that install optimizations. You can install, remove, or run them.\n- Remote repositories let you share and use packages from the community.\n\n=== COMMAND LINE ===\nAll features are also available via terminal:\n  ./knight doctor\n  ./knight install <package>\n  ./knight remove <package>\n  ./knight update\n  ./knight list\n  ./knight info <package>\n  ./knight monitor baseline|compare|history|show\n  ./knight parse <git-url>\n  ./knight remote add|list|remove|update\n\n=== PHILOSOPHY ===\nKnightOS is designed to be safe: it never changes your system without asking. All tweaks are reversible, and you can always return to defaults.\n\n=== NEED HELP? ===\nVisit our repository: https://github.com/LittleDxrky/KnightOS\n\nEnjoy a faster, more stable system!"
